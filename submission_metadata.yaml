  has_network_during_ranking: false
  pre_computation_required: false
  pre_computation_time_minutes: 0

ai_tools_used:
  - ChatGPT
  - Claude AI

ai_usage_summary: |
  ChatGPT and Claude AI were used for project planning, debugging,
  documentation, feature engineering discussions, and code review.
  No candidate data was sent to external APIs during ranking.

methodology_summary: |
  VisionTrackAI is a rule-based candidate ranking system that combines
  structured scoring, AI skill matching, semantic similarity,
  behavioral analysis, recruiter engagement signals, profile
  completeness, and disqualifier detection. Each candidate receives a
  weighted composite score, followed by ranking and reasoning
  generation. The final Top-100 candidates are exported as
  output/submission.csv.

declarations:
  read_submission_spec: true
  code_is_original_work: true
  no_collusion: true
  honeypot_check_done: true
  reproduction_tested: true
